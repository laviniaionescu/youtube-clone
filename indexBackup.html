<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/home.css">
  <title>Youtube</title>
</head>

<body>

  <nav class="top-nav">

      <div class="left-section">

        <div class="burger-menu-container" onclick="menuSwitch()">
          <span class="material-symbols-outlined burger-menu">menu</span>
        </div>

        <div class="logo-container">
          <a href="https://www.youtube.com">
            <img class="yt-logo" src="images/icons/yt-logo.png" alt="">
          </a>
        </div>

       </div>



      <div class="mid-section">

        <div class="search-container">
          <input type="text" class="searchbar" placeholder="Search">  
          <button class="search-btn"><span class="material-symbols-outlined">search</span>
          </button>
        </div>

        <div class="mic-icon-container">
          <span class="material-symbols-outlined mic-icon">mic</span>
        </div>

      </div>



      <div class="right-section">

          <span class="material-symbols-outlined mobile-icons">search</span>
          <span class="material-symbols-outlined">upload</span>
          <span class="material-symbols-outlined mobile-icons">mic</span>
          <span class="material-symbols-outlined">add_alert</span>

        <div class="user-pfp-container">
          <img class="user-pfp" src="images/user-pfp.jpeg" alt="">
        </div>

      </div>

  </nav>

  <nav class="small-side-panel collapsed" id="sidebar">

    <ul>
      <li class="home-container home-container-big" id="home-container-big">
        <span class="material-symbols-outlined home-btn">home</span>
        <span class="home-label" id="home-label">Home</span>
      </li>
    </ul>

    <ul class="small-side-panel-content" id="small-side-panel-content">
      <li>
        <span class="material-symbols-outlined">camera</span>
        Shorts
      </li>

      <li>
        <span class="material-symbols-outlined">subscriptions</span>
        Subscriptions
      </li>

      <li>
        <span class="material-symbols-outlined">for_you</span>
        You
      </li>
    </ul>

    
  </nav>

  <script src="index.js"></script>
</body>

</html>
